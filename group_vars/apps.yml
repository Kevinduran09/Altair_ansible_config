# App runtime storage
uptime_kuma_data_dir: "{{ app_data_root }}/uptime-kuma"
n8n_data_dir: "{{ app_data_root }}/n8n"
portainer_data_dir: "{{ app_data_root }}/portainer"
npm_data_dir: "{{ app_data_root }}/npm"
npm_letsencrypt_dir: "{{ app_data_root }}/npm/letsencrypt"

# App runtime variables
n8n_port: 5678

# App deployments (non-secret)
apps:
  portfolio:
    deploy_dir: "{{ apps_root }}/portfolio"
    image_repo: "ghcr.io/kevinduran09/porfolio-kevinduran"
    image_tag: "sha-1aa4fdc2fe0fc3c60ccd13ea401ab87f45ab9d47"
    container_name: "portfolio-kevinduran"
  n8n:
    deploy_dir: "{{ apps_root }}/n8n"
    image_repo: "docker.n8n.io/n8nio/n8n"
    image_tag: "latest"
    container_name: "n8n"
  uptime_kuma:
    deploy_dir: "{{ stacks_root }}/tools/uptime-kuma"
    image_repo: "louislam/uptime-kuma"
    image_tag: "2.1.3"
    container_name: "uptime-kuma"
  portainer:
    deploy_dir: "{{ tools_root }}/portainer"
    image_repo: "portainer/portainer-ce"
    image_tag: "latest"
    container_name: "portainer"
  npm:
    deploy_dir: "{{ infra_root }}/nginx-proxy-manager"
    image_repo: "jc21/nginx-proxy-manager"
    image_tag: "latest"
    container_name: "nginx-proxy-manager"
