name: Deploy App

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Tag de la app a desplegar (ej: portfolio, n8n, npm)"
        required: true
        type: string
      limit:
        description: "Host/group limit para Ansible"
        required: false
        default: target
        type: string
      playbook:
        description: "Playbook a ejecutar"
        required: false
        default: playbooks/apps.yml
        type: string
      image_tag:
        description: "Tag de imagen asociado al deploy (solo para notificación)"
        required: false
        default: n/a
        type: string
      environment:
        description: "Nombre de entorno para notificación"
        required: false
        default: altair
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.app }}
  cancel-in-progress: false

jobs:
  notify_started:
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_started
      project: ${{ inputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ inputs.image_tag }}
      status: started
      actor: ${{ github.actor }}
      environment: ${{ inputs.environment }}
      extra: "Iniciando ansible deploy"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: notify_started
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          ansible-galaxy collection install community.docker community.general ansible.posix

      - name: Configure vault password file
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Configure SSH key
        env:
          ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ.get("ANSIBLE_SSH_PRIVATE_KEY", "")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if "\\n" in key and "BEGIN" in key:
              key = key.replace("\\n", "\n")
          if key and not key.endswith("\n"):
              key += "\n"

          Path("/home/runner/.ssh/id_ed25519").write_text(key, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure known_hosts (optional)
        run: |
          if [ -n "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          fi

      - name: Run deploy script
        run: |
          chmod +x scripts/deploy-app.sh
          scripts/deploy-app.sh \
            "${{ inputs.app }}" \
            "${{ inputs.limit }}" \
            "${{ inputs.playbook }}" \
            -i inventory/hosts.yml \
            --vault-password-file .vault_pass \
            -e "ssh_private_key_file=/home/runner/.ssh/id_ed25519" \
            -vv

  notify_succeeded:
    if: ${{ needs.deploy.result == 'success' }}
    needs: deploy
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_succeeded
      project: ${{ inputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ inputs.image_tag }}
      status: success
      actor: ${{ github.actor }}
      environment: ${{ inputs.environment }}
      extra: "Deploy finalizado correctamente"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify_failed:
    if: ${{ needs.deploy.result == 'failure' }}
    needs: deploy
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_failed
      project: ${{ inputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ inputs.image_tag }}
      status: failed
      actor: ${{ github.actor }}
      environment: ${{ inputs.environment }}
      extra: "Revisar logs del workflow para detalle del error"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
