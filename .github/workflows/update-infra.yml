name: Update Infra Deploy

on:
  push:
    branches: [main]
    paths:
      - inventory/group_vars/all/apps.yml
  workflow_dispatch:
    inputs:
      app:
        description: "Tag de app de Ansible a desplegar"
        required: true
        type: choice
        options:
          - portfolio
          - n8n
          - uptime-kuma
          - portainer
          - npm
          - netdata
      image_tag:
        description: "Tag de imagen para la notificación"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: update-infra-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.vars.outputs.should_deploy }}
      trigger_mode: ${{ steps.vars.outputs.trigger_mode }}
      app: ${{ steps.vars.outputs.app }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve app and image tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            APP_INPUT="${{ github.event.inputs.app }}"
            TAG_INPUT="${{ github.event.inputs.image_tag }}"

            if [[ -z "$APP_INPUT" || -z "$TAG_INPUT" ]]; then
              printf 'ERROR: app e image_tag son obligatorios para ejecutar deploy\n' >&2
              exit 2
            fi

            echo "trigger_mode=manual" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "app=$APP_INPUT" >> "$GITHUB_OUTPUT"
            echo "image_tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "trigger_mode=push" >> "$GITHUB_OUTPUT"

          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"

          mapfile -t output_lines < <(BEFORE_SHA="$BEFORE_SHA" CURRENT_SHA="$CURRENT_SHA" python3 - <<'PY'
          import os
          import subprocess
          import sys

          import re

          path = "inventory/group_vars/all/apps.yml"
          before = os.environ["BEFORE_SHA"]
          current = os.environ["CURRENT_SHA"]


          def parse_apps(raw: str):
              apps = {}
              current_app = None
              for line in raw.splitlines():
                  app_match = re.match(r"^\s{2}([A-Za-z0-9_-]+):\s*$", line)
                  if app_match:
                      current_app = app_match.group(1)
                      continue

                  if not current_app:
                      continue

                  tag_match = re.match(r"^\s{4}image_tag:\s*['\"]?([^'\"#]+)['\"]?\s*$", line)
                  if tag_match:
                      apps[current_app] = tag_match.group(1).strip()
              return apps


          def load_apps(ref: str):
              try:
                  raw = subprocess.check_output(["git", "show", f"{ref}:{path}"], text=True)
              except subprocess.CalledProcessError:
                  return {}
              return parse_apps(raw)


          old_apps = load_apps(before)
          new_apps = load_apps(current)

          changed = []
          for app_name, new_tag in new_apps.items():
              new_tag = str(new_tag).strip()
              old_tag = str(old_apps.get(app_name, "")).strip()

              if new_tag != old_tag:
                  changed.append((app_name, old_tag, new_tag))

          if len(changed) == 1 and changed[0][2]:
              app_name, old_tag, new_tag = changed[0]
              print("should_deploy=true")
              print(f"app={app_name}")
              print(f"image_tag={new_tag}")
              print(f"change_summary={app_name}:{old_tag or '<none>'}->{new_tag}")
              sys.exit(0)

          if len(changed) == 0:
              print("should_deploy=false")
              print("skip_reason=no_image_tag_changes")
              sys.exit(0)

          print("should_deploy=false")
          print("skip_reason=multiple_image_tag_changes")
          print("change_count=" + str(len(changed)))
          PY
          )

          for line in "${output_lines[@]}"; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done

          if [[ "${#output_lines[@]}" -eq 0 ]]; then
            printf 'ERROR: no se pudo resolver el app/tag desde apps.yml\n' >&2
            exit 3
          fi

      - name: Show resolved context
        shell: bash
        run: |
          printf 'trigger_mode=%s\n' '${{ steps.vars.outputs.trigger_mode }}'
          printf 'should_deploy=%s\n' '${{ steps.vars.outputs.should_deploy }}'
          printf 'app=%s\n' '${{ steps.vars.outputs.app }}'
          printf 'image_tag=%s\n' '${{ steps.vars.outputs.image_tag }}'
          printf 'skip_reason=%s\n' '${{ steps.vars.outputs.skip_reason }}'

  notify_started:
    if: ${{ needs.resolve.outputs.should_deploy == 'true' }}
    needs: resolve
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_started
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: started
      actor: ${{ github.actor }}
      environment: altair
      extra: ${{ needs.resolve.outputs.trigger_mode == 'manual' && 'Deploy manual ejecutado desde workflow_dispatch' || 'Deploy automático por merge en apps.yml (GitOps)' }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy:
    if: ${{ needs.resolve.outputs.should_deploy == 'true' }}
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: [resolve, notify_started]
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          ansible-galaxy collection install community.docker community.general ansible.posix

      - name: Configure vault password file
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Configure SSH key
        env:
          ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ.get("ANSIBLE_SSH_PRIVATE_KEY", "")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if "\\n" in key and "BEGIN" in key:
              key = key.replace("\\n", "\n")
          if key and not key.endswith("\n"):
              key += "\n"

          Path("/home/runner/.ssh/id_ed25519").write_text(key, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure known_hosts (optional)
        run: |
          if [ -n "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          fi

      - name: Run deploy script
        run: |
          chmod +x scripts/deploy-app.sh
          scripts/deploy-app.sh \
            "${{ needs.resolve.outputs.app }}" \
            target \
            playbooks/apps.yml \
            -i inventory/hosts.yml \
            --vault-password-file .vault_pass \
            -e "ssh_private_key_file=/home/runner/.ssh/id_ed25519" \
            -vv

  notify_succeeded:
    if: ${{ needs.resolve.outputs.should_deploy == 'true' && needs.deploy.result == 'success' }}
    needs: [resolve, deploy]
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_succeeded
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: success
      actor: ${{ github.actor }}
      environment: altair
      extra: ${{ needs.resolve.outputs.trigger_mode == 'manual' && 'Deploy manual completado' || 'Deploy automático completado por merge en apps.yml' }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify_failed:
    if: ${{ needs.resolve.outputs.should_deploy == 'true' && needs.deploy.result == 'failure' }}
    needs: [resolve, deploy]
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_failed
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: failed
      actor: ${{ github.actor }}
      environment: altair
      extra: ${{ needs.resolve.outputs.trigger_mode == 'manual' && 'Deploy manual falló' || 'Deploy automático falló por merge en apps.yml' }}
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
