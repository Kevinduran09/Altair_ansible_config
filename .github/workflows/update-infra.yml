name: Update Infra Deploy

on:
  push:
    branches: [main]
    paths:
      - group_vars/apps.yml
  workflow_dispatch:
    inputs:
      app:
        description: "App/tag de Ansible a desplegar"
        required: false
        default: "portfolio"
        type: string
      image_tag:
        description: "Tag de imagen para la notificación"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: update-infra-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.vars.outputs.app }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve app and image tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          APP_INPUT="${{ github.event.inputs.app || '' }}"
          TAG_INPUT="${{ github.event.inputs.image_tag || '' }}"

          APP="${APP_INPUT:-portfolio}"

          if [[ -n "$TAG_INPUT" ]]; then
            TAG="$TAG_INPUT"
          elif [[ "$APP" == "portfolio" ]]; then
            TAG="$(awk '/^  portfolio:/{f=1;next} /^  [a-zA-Z0-9_]+:/{if(f)exit} f && /image_tag:/{gsub(/"/,"",$2); print $2; exit}' group_vars/apps.yml)"
          else
            TAG="n/a"
          fi

          if [[ -z "$TAG" ]]; then
            TAG="n/a"
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

  notify_started:
    needs: resolve
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_started
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: started
      actor: ${{ github.actor }}
      environment: altair
      extra: "Deploy automático por push a main en infra"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: [resolve, notify_started]
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          ansible-galaxy collection install community.docker community.general ansible.posix

      - name: Configure vault password file
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Configure known_hosts (optional)
        run: |
          if [ -n "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "${{ secrets.ANSIBLE_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          fi

      - name: Run deploy script
        run: |
          chmod +x scripts/deploy-app.sh
          scripts/deploy-app.sh \
            "${{ needs.resolve.outputs.app }}" \
            target \
            playbooks/apps.yml \
            -i inventory/hosts.yml \
            --vault-password-file .vault_pass \
            -vv

  notify_succeeded:
    if: ${{ needs.deploy.result == 'success' }}
    needs: [resolve, deploy]
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_succeeded
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: success
      actor: ${{ github.actor }}
      environment: altair
      extra: "Deploy automático completado"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify_failed:
    if: ${{ needs.deploy.result == 'failure' }}
    needs: [resolve, deploy]
    uses: ./.github/workflows/discord-notify.yml
    with:
      event: deploy_failed
      project: ${{ needs.resolve.outputs.app }}
      run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      tag: ${{ needs.resolve.outputs.image_tag }}
      status: failed
      actor: ${{ github.actor }}
      environment: altair
      extra: "Deploy automático falló"
    secrets:
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
