- domain_names:
    - uptime.{{ domain_name }}
  forward_host: "uptime-kuma"
  forward_port: 3001
  forward_scheme: http
  caching_enabled: false
  block_exploits: false
  allow_websocket_upgrade: true
  ssl_forced: true
  http2_support: true
  hsts_enabled: true
  hsts_subdomains: false
  enabled: true
  meta:
    name: "uptime"
    letsencrypt_agree: true
    dns_challenge: false
    onlyTailScale: true
  advanced_config: ""
  locations: []
