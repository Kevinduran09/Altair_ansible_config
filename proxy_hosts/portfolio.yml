- domain_names:
    - portfolio.{{ domain_name }}
  forward_host: "portfolio-kevinduran"
  forward_port: 80
  forward_scheme: http
  caching_enabled: false
  block_exploits: false
  allow_websocket_upgrade: true
  ssl_forced: true
  http2_support: true
  hsts_enabled: true
  hsts_subdomains: false
  enabled: true
  meta:
    name: "portfolio"
    letsencrypt_agree: true
    dns_challenge: false
  advanced_config: ""
  locations: []
