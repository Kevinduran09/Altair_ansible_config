- domain_names:
    - npm.{{ domain_name }}
  forward_host: "nginx-proxy-manager"
  forward_port: "{{ npm_admin_port }}"
  forward_scheme: http
  caching_enabled: false
  block_exploits: false
  allow_websocket_upgrade: true
  ssl_forced: true
  http2_support: true
  hsts_enabled: true
  hsts_subdomains: false
  enabled: true
  meta:
    name: "npm"
    letsencrypt_agree: true
    dns_challenge: false
    onlyTailScale: true
  advanced_config: ""
  locations: []
