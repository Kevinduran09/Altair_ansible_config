- domain_names:
    - n8n.{{ domain_name }}
  forward_host: "n8n"
  forward_port: "{{ n8n_port}}"
  forward_scheme: http
  caching_enabled: false
  block_exploits: false
  allow_websocket_upgrade: true
  ssl_forced: true
  http2_support: true
  hsts_enabled: true
  hsts_subdomains: false
  enabled: true
  meta:
    name: "n8n"
    letsencrypt_agree: true
    dns_challenge: false
  advanced_config: ""
  locations: []
