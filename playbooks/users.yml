- name: Gestionar usuarios en ALTAIR
  hosts: servers
  become: true
  remote_user: "{{ ssh_login_user }}"
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/paths.yml
    - ../group_vars/apps.yml
    - ../group_vars/network.yml
    - ../group_vars/data-services.yml
    - ../group_vars/users.yml

  roles:
    - user-management
