- name: Configuracion base del servidor (modo managed)
  hosts: servers
  become: true
  remote_user: "{{ ssh_login_user }}"
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/paths.yml
    - ../group_vars/apps.yml
    - ../group_vars/network.yml
    - ../group_vars/data-services.yml
  vars:
    bootstrap_mode: managed

  roles:
    - base
    - docker
    - user-management
    - stacks
    - npm
    - security
