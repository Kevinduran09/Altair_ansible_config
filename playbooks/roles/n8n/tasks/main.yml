- name: Crear directorio para n8n
  ansible.builtin.file:
    path: "{{ apps_root }}/n8n"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Crear directorio de datos persistentes de n8n
  ansible.builtin.file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"

- name: Asegurar permisos de escritura en datos de n8n
  ansible.builtin.file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    recurse: true

- name: Crear directorio de archivos locales de n8n
  ansible.builtin.file:
    path: "{{ apps_root }}/n8n/local-files"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Generar docker-compose de n8n
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ apps_root }}/n8n/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Generar archivo .env de n8n
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ apps_root }}/n8n/.env"
    owner: root
    group: root
    mode: "0600"

- name: Levantar stack de n8n
  community.docker.docker_compose_v2:
    project_src: "{{ apps_root }}/n8n"
    state: present
    pull: missing
