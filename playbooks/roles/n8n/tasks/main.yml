- name: Crear directorio para n8n
  ansible.builtin.file:
    path: "{{ apps.n8n.deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Crear directorio de datos persistentes de n8n
  ansible.builtin.file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"

- name: Asegurar permisos de escritura en datos de n8n
  ansible.builtin.file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    recurse: true

- name: Crear directorio de archivos locales de n8n
  ansible.builtin.file:
    path: "{{ apps.n8n.deploy_dir }}/local-files"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Desplegar stack de n8n
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/compose-deploy.yml"
  vars:
    compose_project_dir: "{{ apps.n8n.deploy_dir }}"
    compose_template_src: "{{ role_path }}/templates/docker-compose.yml.j2"
    compose_env_template_src: "{{ role_path }}/templates/.env.j2"
    compose_owner: root
    compose_group: root
    compose_env_owner: root
    compose_env_group: root
    compose_pull_policy: missing
