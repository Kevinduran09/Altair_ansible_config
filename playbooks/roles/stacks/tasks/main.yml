- name: Crear directorio raiz de stacks
  file:
    path: "{{ stacks_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpetas de stacks
  file:
    path: "{{ stacks_root }}/{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop:
    - infra
    - apps
    - tools
    - data-services

- name: Crear directorio raiz de datos
  file:
    path: "{{ data_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpetas de datos persistentes
  file:
    path: "{{ data_root }}/{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  loop:
    - databases
    - apps
    - shared

- name: Crear carpeta personal
  file:
    path: "{{ personal_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpeta de backups
  file:
    path: "{{ backups_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpeta de scripts
  file:
    path: "{{ scripts_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpeta de configuracion
  file:
    path: "{{ config_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear carpeta de logs
  file:
    path: "{{ logs_root }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Crear red docker compartida
  community.docker.docker_network:
    name: proxy
    state: present
