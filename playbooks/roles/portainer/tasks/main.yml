- name: Crear directorio para Portainer
  file:
    path: "{{ tools_root }}/portainer"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Generar docker-compose de Portainer
  template:
    src: docker-compose.yml.j2
    dest: "{{ tools_root }}/portainer/docker-compose.yml"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Levantar stack de Portainer
  community.docker.docker_compose_v2:
    project_src: "{{ tools_root }}/portainer"
    state: present

- name: Verificar Portainer en la red proxy
  command: >
    docker run --rm --network proxy curlimages/curl:8.5.0
    -fsSI http://portainer:9000
  register: portainer_check
  retries: 12
  delay: 5
  until: portainer_check.rc == 0
  changed_when: false
