- name: Crear directorio para Portainer
  ansible.builtin.file:
    path: "{{ apps.portainer.deploy_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Desplegar stack de Portainer
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/compose-deploy.yml"
  vars:
    compose_project_dir: "{{ apps.portainer.deploy_dir }}"
    compose_template_src: "{{ role_path }}/templates/docker-compose.yml.j2"
    compose_owner: "{{ admin_user }}"
    compose_group: "{{ admin_user }}"
    compose_pull_policy: missing

- name: Verificar Portainer en la red proxy
  command: >
    docker run --rm --network proxy curlimages/curl:8.5.0
    -fsSI http://portainer:9000
  register: portainer_check
  retries: 12
  delay: 5
  until: portainer_check.rc == 0
  changed_when: false
