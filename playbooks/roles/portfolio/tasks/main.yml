- name: Check if Portfolio is already running
  ansible.builtin.command:
    cmd: docker compose ps -q --status running
    chdir: "{{ stacks_root }}/apps/portfolio"
  register: portfolio_running
  changed_when: false
  failed_when: false

- name: Create portfolio stack directory
  ansible.builtin.file:
    path: "{{ stacks_root }}/apps/portfolio"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"
  when: portfolio_running.stdout | default('') | length == 0

- name: Clone portfolio repository
  ansible.builtin.git:
    repo: "{{ portfolio_repo }}"
    dest: "{{ stacks_root }}/apps/portfolio/repo"
    version: "{{ portfolio_branch }}"
    force: true
  register: portfolio_git
  when: portfolio_running.stdout | default('') | length == 0

- name: Render production docker-compose for portfolio
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stacks_root }}/apps/portfolio/docker-compose.yml"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"
  when: portfolio_running.stdout | default('') | length == 0

- name: Build and deploy portfolio stack
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_root }}/apps/portfolio"
    state: present
    build: always
  when: portfolio_running.stdout | default('') | length == 0 and (portfolio_git.changed | default(false))

- name: Ensure portfolio stack is running
  community.docker.docker_compose_v2:
    project_src: "{{ stacks_root }}/apps/portfolio"
    state: present
  when: portfolio_running.stdout | default('') | length == 0 and not (portfolio_git.changed | default(false))

- name: Portfolio already running – skipping
  ansible.builtin.debug:
    msg: "Portfolio ya está corriendo, se omite la instalación."
  when: portfolio_running.stdout | default('') | length > 0
