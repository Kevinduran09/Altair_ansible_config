# ---- Firewall safe order: allow first, then enable deny ----
- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable ufw with deny incoming policy
  community.general.ufw:
    state: enabled
    policy: deny

# ---- SSH hardening with config validation ----
- name: Set SSH Port
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port\s+'
    line: "Port {{ ssh_port }}"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Disable root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Disable password auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Disable challenge-response auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication\s+'
    line: "ChallengeResponseAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Ensure fail2ban enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
