# ---- Firewall: primero permitir, luego denegar ----
- name: Permitir SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Permitir HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Permitir HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Activar firewall con politica de denegar
  community.general.ufw:
    state: enabled
    policy: deny

# ---- Hardening de SSH ----
- name: Configurar puerto SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port\s+'
    line: "Port {{ ssh_port }}"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar login de root
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar autenticacion por password
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar challenge-response
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication\s+'
    line: "ChallengeResponseAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Activar fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
