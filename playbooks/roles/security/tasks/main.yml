# ---- Firewall: primero permitir, luego denegar ----
- name: Permitir SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Permitir HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Permitir HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Activar firewall con politica de denegar
  community.general.ufw:
    state: enabled
    policy: deny

# ---- Pre-check anti lockout ----
- name: Verificar que el usuario de login administrado exista
  ansible.builtin.getent:
    database: passwd
    key: "{{ ssh_login_user }}"
  when: bootstrap_mode != 'init'

- name: Definir home del usuario de login administrado
  ansible.builtin.set_fact:
    ssh_login_home: "{{ '/root' if ssh_login_user == 'root' else '/home/' ~ ssh_login_user }}"
  when: bootstrap_mode != 'init'

- name: Verificar authorized_keys del usuario de login administrado
  ansible.builtin.stat:
    path: "{{ ssh_login_home }}/.ssh/authorized_keys"
  register: managed_login_authorized_keys
  when: bootstrap_mode != 'init'

- name: Abortar hardening si el usuario de login no tiene authorized_keys
  ansible.builtin.assert:
    that:
      - managed_login_authorized_keys.stat.exists
      - managed_login_authorized_keys.stat.size | int > 0
    fail_msg: "Lockout prevention: {{ ssh_login_user }} no tiene authorized_keys. No se deshabilita root/password hasta corregir esto."
  when: bootstrap_mode != 'init'

# ---- Hardening de SSH ----
- name: Asegurar directorio runtime de sshd
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configurar puerto SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port\s+'
    line: "Port {{ ssh_port }}"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar login de root
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin {{ 'prohibit-password' if bootstrap_mode == 'init' else 'no' }}"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar autenticacion por password
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Deshabilitar challenge-response
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication\s+'
    line: "ChallengeResponseAuthentication no"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Reiniciar ssh

- name: Aplicar cambios de SSH antes de continuar
  ansible.builtin.meta: flush_handlers

- name: Verificar que SSH responda en puerto configurado
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ssh_port }}"
    timeout: 30
    state: started
  delegate_to: localhost
  become: false

- name: Activar fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
