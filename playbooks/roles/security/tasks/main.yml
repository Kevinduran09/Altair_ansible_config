- name: Register admin user
  user:
    name: "{{ admin_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Allow admin user passwordless sudo
  copy:
    dest: "/etc/sudoers.d/{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"

- name: Add SSH public key for admin user
  authorized_key:
    user: "{{ admin_user }}"
    key: "{{ admin_ssh_pubkey }}"
    state: present

- name: Disabled root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin\s+'
    line: "PermitRootLogin no"
  notify: Restart ssh

- name: Disabled password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s+'
    line: "PasswordAuthentication no"
  notify: Restart ssh

- name: Disabled challenge-response
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication\s+'
    line: "ChallengeResponseAuthentication no"
  notify: Restart ssh

- name: Change SSH port
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port\s+'
    line: "Port {{ ssh_port }}"
  notify: Restart ssh

- name: Enable ufw
  ufw:
    state: enabled
    policy: deny

- name: Allow SSH
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Ensure fail2ban enabled
  service:
    name: fail2ban
    state: started
    enabled: true
