- name: Crear directorio para Uptime Kuma
  ansible.builtin.file:
    path: "{{ apps.uptime_kuma.deploy_dir }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Desplegar stack de Uptime Kuma
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/compose-deploy.yml"
  vars:
    compose_project_dir: "{{ apps.uptime_kuma.deploy_dir }}"
    compose_template_src: "{{ role_path }}/templates/docker-compose.yml.j2"
    compose_owner: "{{ admin_user }}"
    compose_group: "{{ admin_user }}"
    compose_pull_policy: missing

- name: Verificar Uptime Kuma en la red proxy
  command: >
    docker run --rm --network proxy curlimages/curl:8.5.0
    -fsSI http://uptime-kuma:3001
  register: kuma_check
  retries: 12
  delay: 5
  until: kuma_check.rc == 0
  changed_when: false
