- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
- name: Upgrade  packages
  apt:
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - git
      - unzip
      - htop
      - ufw
      - fail2ban
    state: present

- name: Ensure time sync service
  apt:
    name: systemd-timesyncd
    state: present
