- name: Configurar hostname del servidor
  hostname:
    name: "{{ server_hostname }}"

- name: Actualizar cache de apt
  apt:
    update_cache: yes
    cache_valid_time: 3600
- name: Actualizar paquetes del sistema
  apt:
    upgrade: dist

- name: Instalar paquetes base
  apt:
    name:
      - curl
      - ca-certificates
      - git
      - unzip
      - htop
      - ufw
      - fail2ban
    state: present

- name: Instalar servicio de sincronizacion de hora
  apt:
    name: systemd-timesyncd
    state: present
