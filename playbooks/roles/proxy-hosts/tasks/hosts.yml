---
# ── Crear o actualizar proxy hosts en NPM ──

- name: "hosts | Obtener hosts actuales en NPM"
  ansible.builtin.uri:
    url: "{{ npm_base_url }}:{{ npm_admin_port }}/api/nginx/proxy-hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ npm_token }}"
    status_code: 200
    return_content: true
  register: _npm_hosts_raw

- name: "hosts | Indexar hosts por dominio"
  ansible.builtin.set_fact:
    _existing_by_domains: >-
      {{ _existing_by_domains | default({}) | combine({
           (item.domain_names | sort | join(',') | lower): item
         }) }}
  loop: "{{ _npm_hosts_raw.json | default([]) }}"
  loop_control:
    label: "{{ item.domain_names | join(', ') }}"

- name: "hosts | Inicializar mapa de hosts"
  ansible.builtin.set_fact:
    _existing_by_domains: "{{ _existing_by_domains | default({}) }}"

- name: "hosts | Crear hosts que no existen"
  ansible.builtin.uri:
    url: "{{ npm_base_url }}:{{ npm_admin_port }}/api/nginx/proxy-hosts"
    method: POST
    headers:
      Authorization: "Bearer {{ npm_token }}"
    body_format: json
    body:
      domain_names: "{{ item.domain_names }}"
      forward_scheme: "{{ item.forward_scheme }}"
      forward_host: "{{ item.forward_host }}"
      forward_port: "{{ item.forward_port | int }}"
      caching_enabled: "{{ item.caching_enabled | bool }}"
      block_exploits: "{{ item.block_exploits | bool }}"
      allow_websocket_upgrade: "{{ item.allow_websocket_upgrade | bool }}"
      ssl_forced: "{{ item.ssl_forced | bool }}"
      http2_support: "{{ item.http2_support | bool }}"
      hsts_enabled: "{{ item.hsts_enabled | bool }}"
      hsts_subdomains: "{{ item.hsts_subdomains | bool }}"
      enabled: "{{ item.enabled | bool }}"
      advanced_config: "{{ item.advanced_config }}"
      locations: "{{ item.locations }}"
      certificate_id: 0
      meta: {}
    status_code: [200, 201]
    return_content: true
  loop: "{{ proxy_hosts }}"
  loop_control:
    label: "{{ item.meta.name }}"
  when: (item.domain_names | sort | join(',') | lower) not in _existing_by_domains

- name: "hosts | Actualizar hosts con cambios"
  ansible.builtin.uri:
    url: "{{ npm_base_url }}:{{ npm_admin_port }}/api/nginx/proxy-hosts/{{ _existing_by_domains[_key].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ npm_token }}"
    body_format: json
    body:
      domain_names: "{{ item.domain_names }}"
      forward_scheme: "{{ item.forward_scheme }}"
      forward_host: "{{ item.forward_host }}"
      forward_port: "{{ item.forward_port | int }}"
      caching_enabled: "{{ item.caching_enabled | bool }}"
      block_exploits: "{{ item.block_exploits | bool }}"
      allow_websocket_upgrade: "{{ item.allow_websocket_upgrade | bool }}"
      ssl_forced: "{{ item.ssl_forced | bool }}"
      http2_support: "{{ item.http2_support | bool }}"
      hsts_enabled: "{{ item.hsts_enabled | bool }}"
      hsts_subdomains: "{{ item.hsts_subdomains | bool }}"
      enabled: "{{ item.enabled | bool }}"
      certificate_id: "{{ _existing_by_domains[_key].certificate_id | default(0) | int }}"
      advanced_config: "{{ item.advanced_config }}"
      locations: "{{ item.locations }}"
      meta: "{{ _existing_by_domains[_key].meta | default({}) }}"
    status_code: 200
    return_content: true
  loop: "{{ proxy_hosts }}"
  loop_control:
    label: "{{ item.meta.name }}"
  vars:
    _key: "{{ item.domain_names | sort | join(',') | lower }}"
    _remote: "{{ _existing_by_domains[_key] }}"
  when:
    - _key in _existing_by_domains
    - >-
      _remote.forward_host != item.forward_host or
      (_remote.forward_port | int) != (item.forward_port | int) or
      _remote.forward_scheme != item.forward_scheme or
      (_remote.block_exploits | bool) != (item.block_exploits | bool) or
      (_remote.allow_websocket_upgrade | bool) != (item.allow_websocket_upgrade | bool) or
      (_remote.caching_enabled | bool) != (item.caching_enabled | bool) or
      (_remote.enabled | bool) != (item.enabled | bool) or
      (_remote.advanced_config | default('')) != item.advanced_config

- name: "hosts | Refrescar hosts desde NPM"
  ansible.builtin.uri:
    url: "{{ npm_base_url }}:{{ npm_admin_port }}/api/nginx/proxy-hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ npm_token }}"
    status_code: 200
    return_content: true
  register: _npm_hosts_raw

- name: "hosts | Reindexar hosts por dominio"
  ansible.builtin.set_fact:
    _remote_by_domains: >-
      {{ _remote_by_domains | default({}) | combine({
           (item.domain_names | sort | join(',') | lower): item
         }) }}
  loop: "{{ _npm_hosts_raw.json | default([]) }}"
  loop_control:
    label: "{{ item.domain_names | join(', ') }}"

- name: "hosts | Inicializar mapa remoto de hosts"
  ansible.builtin.set_fact:
    _remote_by_domains: "{{ _remote_by_domains | default({}) }}"
