---
# ── Resumen final ──

- name: "report | Resumen de cada proxy host"
  ansible.builtin.debug:
    msg: >-
      {{ item.meta.name }}
      | {{ item.domain_names | join(', ') }}
      | {{ item.forward_scheme }}://{{ item.forward_host }}:{{ item.forward_port }}
      | cert: {{ _certs_by_domains_final[(item.domain_names | sort | join(',') | lower)].id | default('SIN CERT') }}
  loop: "{{ proxy_hosts }}"
  loop_control:
    label: "{{ item.meta.name }}"
