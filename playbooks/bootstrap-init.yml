- name: Bootstrap inicial del servidor virgen (modo init)
  hosts: servers
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/paths.yml
    - ../group_vars/apps.yml
    - ../group_vars/network.yml
    - ../group_vars/data-services.yml
  vars:
    bootstrap_mode: init
  remote_user: "{{ bootstrap_init_user }}"

  roles:
    - base
    - docker
    - user-management
    - stacks
    - npm
    - security
